name: PizzaChicken

options:
  bundleIdPrefix: com.Savagebydesign
  deploymentTarget:
    iOS: "15.0"
  developmentLanguage: en

settings:
  base:
    PRODUCT_NAME: PizzaChicken
    PRODUCT_BUNDLE_IDENTIFIER: com.Savagebydesign.PizzaChicken
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "15.0"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ${APPLE_TEAM_ID}
    CODE_SIGN_STYLE: Manual
    ENABLE_BITCODE: NO
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  PizzaChicken:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - Sources
      - Assets.xcassets
    resources:
      - path: Resources/Info.plist
        buildPhase: none
      - Resources
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.Savagebydesign.PizzaChicken
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        CODE_SIGN_IDENTITY: "Apple Distribution"
        CODE_SIGN_STYLE: Manual
        PROVISIONING_PROFILE_SPECIFIER: match AppStore com.Savagebydesign.PizzaChicken
        DEVELOPMENT_TEAM: ${APPLE_TEAM_ID}
    postBuildScripts:
      - name: Copy chicken_loop.wav into app bundle
        script: |
          set -e

          SRC_FILE="${PROJECT_DIR}/Resources/Audio/chicken_loop.wav"
          DEST_DIR="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/Audio"
          DEST_FILE="${DEST_DIR}/chicken_loop.wav"

          echo "Checking source audio at: ${SRC_FILE}"

          if [ ! -f "${SRC_FILE}" ]; then
            echo "ERROR: Missing source file ${SRC_FILE}"
            exit 1
          fi

          mkdir -p "${DEST_DIR}"
          cp "${SRC_FILE}" "${DEST_FILE}"

          echo "Copied audio to ${DEST_FILE}"
          ls -la "${DEST_DIR}"

    scheme:
      testTargets: []
      gatherCoverageData: false
      environmentVariables: []

schemes:
  PizzaChicken:
    build:
      targets:
        PizzaChicken: all
    run:
      config: Debug
    archive:
      config: Release
