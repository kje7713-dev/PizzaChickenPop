name: PizzaChicken

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: "11.2.0"

options:
  bundleIdPrefix: com.Savagebydesign
  deploymentTarget:
    iOS: "15.0"
  developmentLanguage: en

settings:
  base:
    PRODUCT_NAME: PizzaChicken
    PRODUCT_BUNDLE_IDENTIFIER: com.Savagebydesign.PizzaChicken
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "15.0"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ${APPLE_TEAM_ID}
    CODE_SIGN_STYLE: Manual
    ENABLE_BITCODE: NO
    TARGETED_DEVICE_FAMILY: "1,2"
    GAD_APPLICATION_IDENTIFIER: ca-app-pub-9428188855756038~5488090074
    GAD_INTERSTITIAL_AD_UNIT_ID: ca-app-pub-9428188855756038/1848936777

targets:
  PizzaChicken:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - Sources
      - Assets.xcassets
    dependencies:
      - package: GoogleMobileAds
    resources:
      - path: Resources/Info.plist
        buildPhase: none
      - Resources
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.Savagebydesign.PizzaChicken
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        CODE_SIGN_IDENTITY: "Apple Distribution"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_ENTITLEMENTS: Resources/PizzaChicken.entitlements
        PROVISIONING_PROFILE_SPECIFIER: match AppStore com.Savagebydesign.PizzaChicken
        DEVELOPMENT_TEAM: ${APPLE_TEAM_ID}
    postBuildScripts:
      - name: Copy all audio files into app bundle
        script: |
          set -e

          SRC_DIR="${PROJECT_DIR}/Resources/Audio"
          DEST_DIR="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/Audio"

          mkdir -p "${DEST_DIR}"

          FILES=(
            "chicken_loop.wav"
            "chomp.mp3"
            "mommy.mp3"
            "score.mp3"
            "explode.mp3"
            "level_win.mp3"
          )

          for file in "${FILES[@]}"; do
            SRC_FILE="${SRC_DIR}/${file}"
            DEST_FILE="${DEST_DIR}/${file}"

            if [ -f "${SRC_FILE}" ]; then
              cp "${SRC_FILE}" "${DEST_FILE}"
              echo "Copied ${file} -> ${DEST_FILE}"
            else
              echo "Warning: Missing audio file ${SRC_FILE}"
            fi
          done

          echo "Final Audio bundle contents:"
          ls -la "${DEST_DIR}"

    scheme:
      testTargets: []
      gatherCoverageData: false
      environmentVariables: []

schemes:
  PizzaChicken:
    build:
      targets:
        PizzaChicken: all
    run:
      config: Debug
    archive:
      config: Release
