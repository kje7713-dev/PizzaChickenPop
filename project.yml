name: PizzaChicken

options:
  bundleIdPrefix: com.Savagebydesign
  deploymentTarget:
    iOS: "15.0"
  developmentLanguage: en

settings:
  base:
    PRODUCT_NAME: PizzaChicken
    PRODUCT_BUNDLE_IDENTIFIER: com.Savagebydesign.PizzaChicken
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "15.0"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ${APPLE_TEAM_ID}
    CODE_SIGN_STYLE: Manual
    ENABLE_BITCODE: NO
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  PizzaChicken:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - Sources
      - Assets.xcassets
    resources:
      - path: Resources/Info.plist
        buildPhase: none
      - Resources
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.Savagebydesign.PizzaChicken
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        CODE_SIGN_IDENTITY: "Apple Distribution"
        CODE_SIGN_STYLE: Manual
        PROVISIONING_PROFILE_SPECIFIER: match AppStore com.Savagebydesign.PizzaChicken
        DEVELOPMENT_TEAM: ${APPLE_TEAM_ID}
    postBuildScripts:
      - name: Copy all audio files into app bundle
        script: |
          set -e

          SRC_DIR="${PROJECT_DIR}/Resources/Audio"
          DEST_DIR="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/Audio"

          mkdir -p "${DEST_DIR}"

          FILES=(
            "chicken_loop.wav"
            "chomp.mp3"
            "mommy.mp3"
            "score.mp3"
            "explode.mp3"
            "level_win.mp3"
          )

          for file in "${FILES[@]}"; do
            SRC_FILE="${SRC_DIR}/${file}"
            DEST_FILE="${DEST_DIR}/${file}"

            if [ -f "${SRC_FILE}" ]; then
              cp "${SRC_FILE}" "${DEST_FILE}"
              echo "Copied ${file} -> ${DEST_FILE}"
            else
              echo "Warning: Missing audio file ${SRC_FILE}"
            fi
          done

          echo "Final Audio bundle contents:"
          ls -la "${DEST_DIR}"

    scheme:
      testTargets: []
      gatherCoverageData: false
      environmentVariables: []

schemes:
  PizzaChicken:
    build:
      targets:
        PizzaChicken: all
    run:
      config: Debug
    archive:
      config: Release
